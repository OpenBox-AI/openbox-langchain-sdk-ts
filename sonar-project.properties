# The sonar steps in .github/workflows/{release,pr-quality}.yml no-op cleanly
# if SONAR_TOKEN/SONAR_HOST_URL are unset.
sonar.projectKey=openbox-langchain-governance-ts
sonar.projectName=OpenBox LangChain Governance SDK (TS)
sonar.organization=openbox-ai

sonar.sources=src
sonar.tests=test
sonar.exclusions=dist/**,node_modules/**,coverage/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8

# S107 (max parameters) is inapplicable to the callback surface: the handler
# methods override LangChain's BaseCallbackHandler, whose signatures (e.g.
# handleToolStart's 8 parameters) are dictated upstream and cannot be reduced.
sonar.issue.ignore.multicriteria=langchainCallbackArity
sonar.issue.ignore.multicriteria.langchainCallbackArity.ruleKey=typescript:S107
sonar.issue.ignore.multicriteria.langchainCallbackArity.resourceKey=src/core-callback*.ts
