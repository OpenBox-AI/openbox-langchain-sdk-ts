# Placeholder project key -- replace with the real key from your
# SonarQube/SonarCloud project before the sonar steps in
# .github/workflows/{release,pr-quality}.yml can report against it.
# Those steps already no-op cleanly if SONAR_TOKEN/SONAR_HOST_URL are unset.
sonar.projectKey=openbox-langchain-governance-ts
sonar.projectName=OpenBox LangChain Governance SDK (TS)
sonar.organization=openbox-ai

sonar.sources=src
sonar.tests=test
sonar.exclusions=dist/**,node_modules/**,coverage/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8
